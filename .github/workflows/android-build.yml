name: Android Build

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.11.1

      - name: Build Debug APK
        shell: bash
        run: gradle clean :app:assembleDebug --stacktrace --no-configuration-cache --warning-mode all

      - name: Build Release APK
        shell: bash
        run: gradle :app:assembleRelease --stacktrace --no-configuration-cache --warning-mode all

      - name: Build Release AAB
        shell: bash
        run: gradle :app:bundleRelease --stacktrace --no-configuration-cache --warning-mode all

      - name: Collect APKs
        shell: bash
        run: |
          mkdir -p output-apks
          cp app/build/outputs/apk/debug/app-debug.apk output-apks/voicepro-recorder-debug.apk
          cp app/build/outputs/apk/release/app-release-unsigned.apk output-apks/voicepro-recorder-release-unsigned.apk
          cp app/build/outputs/bundle/release/app-release.aab output-apks/voicepro-recorder-release-unsigned.aab
          ls -lh output-apks

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: voicepro-recorder-apks
          path: |
            output-apks/*.apk
            output-apks/*.aab
          if-no-files-found: error
